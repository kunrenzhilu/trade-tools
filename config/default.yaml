# MyTrader 默认配置
# 敏感信息（API Key 等）放在 .env，不放这里

system:
  env: "paper"                   # paper | live
  timezone: "America/New_York"   # 美股时区；港股改为 Asia/Hong_Kong
  log_level: "INFO"

data:
  provider: "yfinance"
  cache_dir: "~/.mytrader/cache"
  # 日线数据：当天 18:00 后刷新；分钟数据：30 分钟后刷新
  cache_ttl_daily_hour: 18
  cache_ttl_intraday_minutes: 30

strategy:
  name: "dual_ma"
  params:
    fast: 10
    slow: 30

backtest:
  init_cash: 100000
  fees: 0.001        # 0.1% 手续费
  slippage: 0.001    # 0.1% 滑点
  # 信号执行时机：next_open = 下一根 bar 开盘价（避免前视偏差）
  fill_price: "next_open"

risk:
  risk_per_trade: 0.01           # 每次承担账户的 1% 风险
  max_position_pct: 0.20
  max_total_exposure_pct: 0.80
  circuit_breaker:
    daily_loss_limit: 0.02
    weekly_loss_limit: 0.05
    monthly_loss_limit: 0.10

execution:
  mode: "paper"                  # paper | semi_auto | auto
  broker: "alpaca"

monitor:
  telegram:
    enabled: false
    alert_levels: ["WARN", "ERROR", "CRITICAL"]

# ── Phase 3 新增配置 ─────────────────────────────────────────────────────────

alpaca:
  paper: true                    # true=沙盒; false=真实账户
  # api_key / secret_key 通过 .env 注入，不写在此处

ibkr:
  host: "127.0.0.1"
  port: 7497                     # 7497=TWS纸面; 7496=TWS实盘; 4002=GW纸面; 4001=GW实盘
  client_id: 1
  timeout: 10
  readonly: true                 # Phase 3 初期只读保护

notification:
  # telegram_enabled / wechat_work_enabled / bot_token / chat_id 通过 .env 注入
  alert_cooldown_seconds: 300    # 同类告警最小间隔（秒），防骚扰
  min_alert_level: "WARN"        # INFO / WARN / ERROR / CRITICAL

scheduler:
  enabled: true
  timezone: "America/New_York"
  morning_scan_hour: 9
  morning_scan_minute: 35
  intraday_interval_minutes: 30
  eod_check_hour: 15
  eod_check_minute: 45
  reconciliation_hour: 16
  reconciliation_minute: 30
  misfire_grace_time: 60         # 错过触发后的最大延迟宽限（秒）
